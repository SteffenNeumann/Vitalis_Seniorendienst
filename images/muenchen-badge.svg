<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 210" width="148" height="210" role="img" aria-label="Ausgezeichnet auf muenchen.de – Das offizielle Stadtportal">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0070C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005B9A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC200;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <rect x="0" y="0" width="148" height="210" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="148" height="210" rx="10" ry="10" fill="url(#bgGrad)"/>

  <!-- White inner panel -->
  <rect x="6" y="6" width="136" height="198" rx="7" ry="7" fill="white" clip-path="url(#badgeClip)"/>

  <!-- Top blue banner -->
  <rect x="6" y="6" width="136" height="78" rx="7" ry="7" fill="#0070C0"/>
  <rect x="6" y="70" width="136" height="14" fill="#0070C0"/>

  <!-- "ausgezeichnet auf" curved text simulation -->
  <text x="74" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="600" fill="white" letter-spacing="0.3">ausgezeichnet auf</text>

  <!-- Munich skyline silhouette (Frauenkirche + cityscape) -->
  <!-- Left buildings -->
  <rect x="14" y="58" width="6" height="18" fill="#FFC200" rx="1"/>
  <rect x="12" y="55" width="10" height="4" fill="#FFC200" rx="1"/>
  <rect x="22" y="52" width="5" height="24" fill="#FFC200" rx="1"/>
  <rect x="29" y="60" width="7" height="16" fill="#FFC200" rx="1"/>
  <!-- Left Frauenkirche tower -->
  <rect x="38" y="36" width="10" height="40" fill="#FFC200" rx="1"/>
  <ellipse cx="43" cy="36" rx="5" ry="6" fill="#FFC200"/>
  <!-- Right Frauenkirche tower -->
  <rect x="52" y="38" width="10" height="38" fill="#FFC200" rx="1"/>
  <ellipse cx="57" cy="38" rx="5" ry="6" fill="#FFC200"/>
  <!-- Middle buildings -->
  <rect x="64" y="55" width="8" height="21" fill="#FFC200" rx="1"/>
  <rect x="74" y="50" width="6" height="26" fill="#FFC200" rx="1"/>
  <!-- Right church spire -->
  <rect x="82" y="42" width="8" height="34" fill="#FFC200" rx="1"/>
  <polygon points="86,32 82,44 90,44" fill="#FFC200"/>
  <!-- Right buildings -->
  <rect x="92" y="56" width="7" height="20" fill="#FFC200" rx="1"/>
  <rect x="101" y="60" width="6" height="16" fill="#FFC200" rx="1"/>
  <rect x="109" y="53" width="8" height="23" fill="#FFC200" rx="1"/>
  <rect x="119" y="62" width="6" height="14" fill="#FFC200" rx="1"/>
  <rect x="127" y="57" width="7" height="19" fill="#FFC200" rx="1"/>
  <!-- Ground line -->
  <rect x="12" y="76" width="124" height="3" fill="#FFC200" rx="1"/>

  <!-- muenchen.de logo text -->
  <text x="74" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#0070C0" letter-spacing="-0.5">muenchen.de</text>

  <!-- Divider line -->
  <line x1="20" y1="113" x2="128" y2="113" stroke="#E0E0E0" stroke-width="1"/>

  <!-- "Das offizielle Stadtportal" -->
  <text x="74" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#555555" letter-spacing="0.2">Das offizielle Stadtportal</text>

  <!-- Stars (4 stars) -->
  <!-- Star 1 -->
  <text x="28" y="157" font-family="Arial, sans-serif" font-size="22" fill="#FFD700">★</text>
  <!-- Star 2 -->
  <text x="50" y="157" font-family="Arial, sans-serif" font-size="22" fill="#FFD700">★</text>
  <!-- Star 3 -->
  <text x="72" y="157" font-family="Arial, sans-serif" font-size="22" fill="#FFD700">★</text>
  <!-- Star 4 -->
  <text x="94" y="157" font-family="Arial, sans-serif" font-size="22" fill="#FFD700">★</text>

  <!-- Bottom text -->
  <text x="74" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333333" font-weight="600">Jetzt bewerten auf</text>
  <text x="74" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0070C0" font-weight="700">www.muenchen.de</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="147" height="209" rx="9.5" ry="9.5" fill="none" stroke="#0070C0" stroke-width="1"/>
</svg>
